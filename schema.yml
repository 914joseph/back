components:
  schemas:
    AvaliacaoDesempenho:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        colaborador:
          allOf:
          - $ref: '#/components/schemas/Colaborador'
          readOnly: true
        supervisor:
          allOf:
          - $ref: '#/components/schemas/Colaborador'
          readOnly: true
        itemavaliacaodesempenho:
          type: array
          items:
            $ref: '#/components/schemas/ItemAvaliacaoDesempenho'
          readOnly: true
        mesCompetencia:
          allOf:
          - $ref: '#/components/schemas/MesCompetenciaEnum'
          minimum: 0
          maximum: 32767
        statusAvaliacao:
          $ref: '#/components/schemas/StatusAvaliacaoEnum'
        nota:
          type: number
          format: double
        sugestoesSupervisor:
          type: string
        observacoesAvaliado:
          type: string
      required:
      - colaborador
      - id
      - itemavaliacaodesempenho
      - mesCompetencia
      - sugestoesSupervisor
      - supervisor
    Colaborador:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nome:
          type: string
          maxLength: 200
        cpf:
          type: string
          maxLength: 11
        tipo:
          allOf:
          - $ref: '#/components/schemas/TipoEnum'
          minimum: -2147483648
          maximum: 2147483647
      required:
      - cpf
      - id
      - nome
    DimensaoEnum:
      enum:
      - Comportamento
      - Entregas
      - Trabalho em equipe
      type: string
      description: |-
        * `Comportamento` - Comportamento
        * `Entregas` - Entregas
        * `Trabalho em equipe` - Trab Equipe
    ItemAvaliacaoDesempenho:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        tipoItemAvaliacaoDesempenho:
          allOf:
          - $ref: '#/components/schemas/TipoItemAvaliacaoDesempenho'
          readOnly: true
        observacoes:
          type: string
        nota:
          type: integer
          maximum: 5
          minimum: 1
        avaliacaoDesempenho:
          type: integer
      required:
      - avaliacaoDesempenho
      - id
      - nota
      - observacoes
